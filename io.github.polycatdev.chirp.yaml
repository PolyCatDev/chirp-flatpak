app-id: io.github.polycatdev.chirp
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: chirp-wrapper.sh

cleanup:
  - /bin/pygobject*
  - /bin/pygtk*
  - /include
  - /lib/*.la
  - /lib/debug
  - /lib/pkgconfig
  - /lib/pygtk
  - /share/doc
  - /share/gtk-doc
  - /bin/wxdocs

finish-args:
  - --share=network
  - --filesystem=home
  - --device=all
  - --socket=wayland
  - --socket=x11
  - --share=ipc

modules:
  - name: chirp
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=${FLATPAK_DEST}
    sources:
      - type: git
        url: https://github.com/kk7ds/chirp.git
        branch: master

    modules:
      - chirp-deps.json

      - name: setup-wrapper
        buildsystem: simple
        build-commands:
          - install -Dm755 chirp-wrapper.sh /app/bin/chirp-wrapper.sh
        sources:
          - type: file
            path: chirp-wrapper.sh

  - name: desktop-integration
    buildsystem: simple
    build-commands:
      - install -Dm644 io.github.polycatdev.chirp.metainfo.xml -t /app/share/metainfo/io.github.polycatdev.chirp.metainfo.xml
      - install -Dm644 io.github.polycatdev.chirp.png /app/share/icons/hicolor/512x512/apps/io.github.polycatdev.chirp.png
      - install -Dm644 io.github.polycatdev.chirp.desktop /app/share/applications/io.github.polycatdev.chirp.desktop

    sources:
      - type: file
        path: io.github.polycatdev.chirp.metainfo.xml

      - type: file
        path: io.github.polycatdev.chirp.png

      - type: file
        path: io.github.polycatdev.chirp.desktop     
